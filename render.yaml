services:
  - type: web
    name: gestao-salao-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production

  - type: cron
    name: keep-alive
    runtime: node
    schedule: "*/14 * * * *"
    buildCommand: echo "ok"
    startCommand: node -e "require('https').get(process.env.BACKEND_URL + '/health', r => { process.stdout.write('keep-alive: ' + r.statusCode + '\n'); process.exit(0); })"
    envVars:
      - key: BACKEND_URL
        sync: false
